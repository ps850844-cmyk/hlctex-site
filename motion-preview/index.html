<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <title>HLC Facilities and Production Capacity</title>
  <link rel="stylesheet" href="./preview.css">
</head>
<body>
  <main>
    <section class="panel factory-panel">
      <div class="copy">
        <h1>FACTORY AREA</h1>
        <p class="value"><strong>98,000</strong><span>m²</span></p>
      </div>

      <div class="art factory-art" aria-label="Animated isometric view of the HLC factory">
        <svg viewBox="65 145 640 290" role="img">
          <g class="soft-shadow" transform="translate(9 12)">
            <path d="M80 310 380 160 690 270 390 420Z"/>
          </g>

          <g class="line-art campus draw-in">
            <path class="campus-base fill-paper" d="M80 310 380 160 690 270 390 420Z"/>

            <!-- Far-left stepped wing: every wall terminates on the same ground plane -->
            <g class="left-wing">
              <path class="fill-light" d="M120 311 151 322 151 280 120 269Z"/>
              <path class="fill-mid" d="M151 322 250 273 250 231 151 280Z"/>
              <path class="fill-paper" d="M120 269 219 220 250 231 151 280Z"/>
              <path class="fill-light" d="M178 314 209 325 209 277 178 266Z"/>
              <path class="fill-mid" d="M209 325 308 276 308 228 209 277Z"/>
              <path class="fill-paper" d="M178 266 277 217 308 228 209 277Z"/>
              <path class="wing-ribbon" d="M135 274v42m22-53v42m22-52v42m22-53v42"/>
            </g>

            <!-- Main hall: projected from one rectangle, then raised vertically -->
            <g class="main-hall">
              <path class="fill-light" d="M223 297 341 339 341 267 223 225Z"/>
              <path class="fill-mid" d="M341 339 476 271 476 199 341 267Z"/>
              <path class="fill-paper" d="M223 225 358 157 476 199 341 267Z"/>
              <path class="roof-ridge" d="M247 221 359 175 451 207"/>
              <path class="facade-lines" d="M241 303 323 332m-82-11 82 29m-82-11 82 29"/>
            </g>

            <!-- Rear multi-span workshop: four bays on the same projected roof plane -->
            <g class="rear-workshop">
              <path class="fill-light" d="M385 277 518 324 518 269 385 222Z"/>
              <path class="fill-mid" d="M518 324 638 264 638 209 518 269Z"/>
              <path class="fill-paper" d="M385 222 415 207 548 254 518 269Z"/>
              <path class="fill-paper" d="M415 207 445 192 578 239 548 254Z"/>
              <path class="fill-paper" d="M445 192 475 177 608 224 578 239Z"/>
              <path class="fill-paper" d="M475 177 505 162 638 209 608 224Z"/>
              <path class="roof-ridge" d="M415 207 548 254m-103-62 133 47m-103-62 133 47"/>
              <path class="workshop-lines" d="M536 315v-55m29 41v-55m29 41v-55"/>
            </g>

            <!-- Landmark riser is attached to the main hall, not floating above it -->
            <g class="landmark-tower">
              <path class="fill-dark" d="M365 170c0-9 10-15 21-11l20 7v99l-28 14v-91c-8-3-13-9-13-18Z"/>
              <path d="M378 188 406 174"/>
              <path d="M378 279 406 265"/>
            </g>

            <!-- Front high-rise pair: base points lie on the projected campus plane -->
            <g class="front-towers">
              <path class="fill-light" d="M249 339 302 358 302 223 249 204Z"/>
              <path class="fill-mid" d="M302 358 347 336 347 201 302 223Z"/>
              <path class="fill-paper" d="M249 204 294 182 347 201 302 223Z"/>
              <path d="M264 209v135m16-129v135m7-139v135"/>

              <path class="fill-light" d="M322 316 378 336 378 211 322 191Z"/>
              <path class="fill-mid" d="M378 336 429 311 429 186 378 211Z"/>
              <path class="fill-paper" d="M322 191 373 166 429 186 378 211Z"/>
              <path d="M338 197v114m16-108v114m8-117v114"/>
            </g>

            <!-- Near-right entrance building -->
            <g class="entrance-block">
              <path class="fill-light" d="M408 337 464 357 464 315 408 295Z"/>
              <path class="fill-mid" d="M464 357 533 322 533 280 464 315Z"/>
              <path class="fill-paper" d="M408 295 477 260 533 280 464 315Z"/>
              <path class="entry-arch" d="M471 351v-12c0-12 9-21 20-18 10 3 16 12 16 22v12"/>
            </g>

            <!-- Vertical facade bands stay on their respective wall planes -->
            <g class="facade-bands">
              <path class="fill-dark" d="M120 281 133 286v30l-13-5Z"/>
              <path class="fill-dark" d="M178 278 191 283v37l-13-6Z"/>
              <path class="fill-dark" d="M341 280 357 272v59l-16 8Z"/>
              <path class="fill-dark" d="M518 278 533 270v46l-15 8Z"/>
              <path class="fill-dark" d="M464 324 478 317v33l-14 7Z"/>
            </g>
          </g>
        </svg>
      </div>
      <span class="section-no">01</span>
    </section>

    <section class="panel capacity-panel">
      <div class="capacity-heading">
        <span class="kicker">MONTHLY CAPACITY</span>
        <p><strong>1,100,000 m</strong><span>/ month</span></p>
      </div>

      <div class="art production-art" aria-label="Animated integrated textile production line">
        <svg viewBox="0 0 1200 330" role="img">
          <g class="soft-shadow" transform="translate(7 10)">
            <path d="M58 245h1086v34H58z"/>
          </g>
          <g class="line-art production-line draw-in">
            <path class="baseline" d="M43 260h1114"/>
            <g class="feed-unit">
              <g class="roller-group feed-roll clockwise">
                <circle class="fill-paper" cx="77" cy="222" r="30"/>
                <circle cx="77" cy="222" r="8"/>
                <path d="M77 192v60m-19-52 38 44m-40-2 42-39"/>
              </g>
              <path class="fill-light" d="M111 202h259v49H111z"/>
              <path d="M131 202v49m67-49v49m68-49v49m68-49v49"/>
            </g>
            <g class="bath-unit">
              <path class="fill-mid" d="M370 218h145v34H370z"/>
              <path d="M397 218v-26h23v26m47 0v-34h23v34"/>
              <g class="roller-group nip-roll counter-clockwise">
                <circle class="fill-paper" cx="407" cy="231" r="11"/>
                <path d="M407 220v22m-8-18 16 14"/>
              </g>
              <g class="roller-group nip-roll clockwise">
                <circle class="fill-paper" cx="478" cy="231" r="11"/>
                <path d="M478 220v22m-8-18 16 14"/>
              </g>
            </g>
            <g class="dryer-unit">
              <path class="fill-light" d="M515 191h196v60H515z"/>
              <path d="M550 191v60m55-60v60m55-60v60"/>
              <g class="fan-group fan-a clockwise">
                <circle class="fill-paper" cx="546" cy="226" r="13"/>
                <path d="M546 226c-8-8-4-13 0-12 4 1 4 7 0 12Zm0 0c11-2 14 4 11 7-3 3-8 0-11-7Zm0 0c-3 11-10 11-12 7-2-4 3-8 12-7Z"/>
              </g>
              <g class="fan-group fan-b counter-clockwise">
                <circle class="fill-paper" cx="603" cy="226" r="13"/>
                <path d="M603 226c-8-8-4-13 0-12 4 1 4 7 0 12Zm0 0c11-2 14 4 11 7-3 3-8 0-11-7Zm0 0c-3 11-10 11-12 7-2-4 3-8 12-7Z"/>
              </g>
              <g class="fan-group fan-c clockwise">
                <circle class="fill-paper" cx="660" cy="226" r="13"/>
                <path d="M660 226c-8-8-4-13 0-12 4 1 4 7 0 12Zm0 0c11-2 14 4 11 7-3 3-8 0-11-7Zm0 0c-3 11-10 11-12 7-2-4 3-8 12-7Z"/>
              </g>
              <path d="M531 181v-11m34 11v-11m34 11v-11m34 11v-11m34 11v-11m34 11v-11"/>
            </g>
            <g class="inspection-unit">
              <path class="fill-mid" d="M711 210h107v41H711z"/>
              <path d="M727 210v-30h14v30m61 0v-41h14v41"/>
              <path class="scanner" d="m748 181 29 57m-5-57-29 57"/>
            </g>
            <g class="finish-unit">
              <path class="fill-light" d="M818 177h263v74H818z"/>
              <path d="M863 177v74m76-74v74m77-74v74"/>
              <path class="hood" d="M834 177v-21h190v21"/>
              <g class="roller-group takeup-roll clockwise">
                <circle class="fill-paper winding-shell" cx="1067" cy="218" r="34"/>
                <circle cx="1067" cy="218" r="9"/>
                <path d="M1067 184v68m-23-57 47 49m-48 1 48-50"/>
              </g>
            </g>
            <path class="fabric-path" d="M77 188 126 188 151 219 184 178 218 219 255 177 290 219 331 176 366 219 407 188 478 188 530 188 546 207 603 207 660 207 727 207 742 182 772 237 802 180 844 205 895 174 938 205 981 174 1023 205 1067 184"/>
          </g>
          <g class="material-pulses">
            <circle class="material material-1" r="5"/>
            <circle class="material material-2" r="5"/>
            <circle class="material material-3" r="5"/>
            <circle class="material material-4" r="5"/>
          </g>
        </svg>
      </div>
      <span class="section-no">02</span>
    </section>

    <section class="panel hours-panel">
      <div class="copy hours-copy">
        <span class="kicker">PRODUCTION HOURS</span>
        <h1>CONTINUOUS PRODUCTION</h1>
        <p class="value"><strong>24h</strong><span>/ day</span></p>
        <p class="shift-label">— THREE-SHIFT OPERATION —</p>
      </div>

      <div class="art time-art" aria-label="Animated clock and production gears">
        <svg viewBox="150 45 500 560" role="img">
          <g class="soft-shadow" transform="translate(10 11)">
            <circle cx="358" cy="232" r="137"/>
            <circle cx="518" cy="433" r="84"/>
            <circle cx="268" cy="438" r="49"/>
          </g>
          <g class="line-art draw-in">
            <g class="clock-body">
              <path class="fill-paper" d="M326 70h64v24h-64z"/>
              <path d="M343 94v15m30-15v15"/>
              <circle class="fill-light" cx="358" cy="232" r="137"/>
              <circle class="fill-paper" cx="358" cy="232" r="116"/>
              <path d="M358 116v18m0 196v18m116-116h-18m-196 0h-18"/>
              <path d="m276 150 13 13m138 138 13 13m0-164-13 13M289 301l-13 13"/>
            </g>
            <g class="hands">
              <path class="hour-hand" d="M358 232v-64"/>
              <path class="minute-hand" d="M358 232v-92"/>
              <circle class="fill-paper" cx="358" cy="232" r="8"/>
            </g>
            <g class="gear gear-large">
              <path class="fill-light" d="M500 337h36l6 24 22 9 21-12 25 25-12 21 9 22 24 6v36l-24 6-9 22 12 21-25 25-21-12-22 9-6 24h-36l-6-24-22-9-21 12-25-25 12-21-9-22-24-6v-36l24-6 9-22-12-21 25-25 21 12 22-9z"/>
              <circle class="fill-paper" cx="518" cy="450" r="39"/>
              <circle cx="518" cy="450" r="17"/>
            </g>
            <g class="gear gear-small">
              <path class="fill-light" d="M254 375h28l5 17 16 7 16-9 19 20-9 16 7 16 18 5v28l-18 5-7 16 9 16-19 20-16-9-16 7-5 17h-28l-5-17-16-7-16 9-20-20 10-16-7-16-18-5v-28l18-5 7-16-10-16 20-20 16 9 16-7z"/>
              <circle class="fill-paper" cx="268" cy="456" r="25"/>
              <circle cx="268" cy="456" r="10"/>
            </g>
          </g>
          <g class="shift-dots">
            <circle cx="335" cy="545" r="5"/><circle cx="358" cy="545" r="5"/><circle cx="381" cy="545" r="5"/>
          </g>
        </svg>
      </div>
      <div class="mini-production line-art">
        <span></span><i></i><i></i><i></i><i></i><i></i><i></i><b></b>
      </div>
      <span class="section-no">03</span>
    </section>
  </main>
</body>
</html>

server {
    listen 80;
    listen [::]:80;
    server_name hlctex.com www.hlctex.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name hlctex.com www.hlctex.com;

    ssl_certificate /etc/letsencrypt/live/hlctex.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hlctex.com/privkey.pem;

    root /var/www/hlc;
    index index.html;

    charset utf-8;
    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|webp|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    location ^~ /admin/ {
        add_header X-Robots-Tag "noindex, nofollow";
        try_files $uri $uri/ =404;
    }
}
